<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Controle Financeiro</h1>
        </header>

        <section class="dashboard">
            <div class="card-total">
                <h3>A Pagar (Mês)</h3>
                <p id="total-contas">R$ 0,00</p>
            </div>
            <div class="card-total">
                <h3>Gastos Variáveis</h3>
                <p id="total-variaveis">R$ 0,00</p>
            </div>
            <div class="card-total">
                <h3>Cartão (Mês Atual)</h3>
                <p id="total-cartao-mes">R$ 0,00</p>
            </div>
            <div class="card-total" id="card-geral">
                <h3>Total Geral do Mês</h3>
                <p id="total-geral">R$ 0,00</p>
            </div>
        </section>

        <main class="grid-sections">
            
            <section class="section-box">
                <h2>Contas a Pagar</h2>
                <form id="form-conta">
                    <input type="text" id="conta-nome" placeholder="Ex: Internet, Luz" required>
                    <div class="row-inputs">
                        <input type="number" step="0.01" id="conta-valor" placeholder="Valor (R$)" required>
                        <input type="date" id="conta-data" required>
                    </div>
                    <button type="submit">Adicionar Conta</button>
                </form>
                <ul id="lista-contas" class="item-list"></ul>
            </section>

            <section class="section-box">
                <h2>Gastos Variáveis</h2>
                <form id="form-variavel">
                    <input type="text" id="var-categoria" placeholder="Lista (Ex: Padaria, Mercado)" required list="categorias-sugeridas">
                    <datalist id="categorias-sugeridas">
                        <option value="Padaria"></option>
                        <option value="Mercado"></option>
                        <option value="Petshop"></option>
                    </datalist>
                    <div class="row-inputs">
                        <input type="number" step="0.01" id="var-valor" placeholder="Valor (R$)" required>
                        <input type="date" id="var-data" required>
                    </div>
                    <button type="submit">Lançar Gasto</button>
                </form>
                <div id="container-categorias"></div>
            </section>

            <section class="section-box">
                <h2>Cartão de Crédito</h2>
                <form id="form-cartao">
                    <input type="text" id="cartao-nome" placeholder="Estabelecimento / Compra" required>
                    <div class="row-inputs">
                        <input type="number" step="0.01" id="cartao-valor" placeholder="Valor" required>
                        <select id="cartao-tipo-valor">
                            <option value="total">Valor Total</option>
                            <option value="parcela">Valor por Parcela</option>
                        </select>
                    </div>
                    <div class="row-inputs">
                        <input type="number" id="cartao-parcelas" placeholder="Nº parcelas" min="1" required>
                        <input type="date" id="cartao-data" required>
                    </div>
                    <button type="submit">Lançar Compra</button>
                </form>
                
                <ul id="lista-cartao-mes" class="item-list"></ul>

                <div class="future-months">
                    <h4>Faturas dos Próximos Meses</h4>
                    <ul id="lista-cartao-futuro" class="item-list"></ul>
                </div>
            </section>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
