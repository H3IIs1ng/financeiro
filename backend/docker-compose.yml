version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: financeiro-db
    environment:
      POSTGRES_USER: rodrigomoraes
      POSTGRES_PASSWORD: root
      POSTGRES_DB: financeiro_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: